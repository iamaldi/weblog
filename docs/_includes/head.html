<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
      
    @import url('https://fonts.googleapis.com/css2?family=Roboto');

    body {
/*      background-color: #121212;*/
      background-color: white;
      color: black;
      font: 400 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    } 

    a, a:visited, a:hover {
      color: #1F8A70;
      cursor: pointer;
    }

    code {
      padding: 0px 2px;
    }

    pre, code {
      font-size: 11px;
      border: 1px solid #1f8a7069;
      border-radius: 3px;
      background-color: unset;
    }

    .post-title {
      font-size: 25px;
      line-height: 1.4;
    }

    .highlight {
      background: unset;
    }

    .highlighter-rouge .highlight {
      background: unset;
    }

    h3 {
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: unset;
    }

    .post-list > li {
      margin-bottom: 30px;
    }
    
    .references {
      padding-top: 30px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    p {
      text-align: justify;
    }
    
    table {
            border: 1px solid #1f8a7069;
    }

    /* remove the default coloring on the even table rows*/
    table tr:nth-child(even) td{
        background-color: white;
    }

    table th:nth-child(even) td{
        background-color: white;
    }

    .post-link {
      font-size: 16px;
    }

    .post-list-heading {
      font-size: 20px;
      font-weight: bold;
    }

    .post-excerpt {
        margin-top: 10px;
    }

    hr {
      border: none;
      height: 1px;
      background-color: #1f8a7069;
    }

    .svg-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      fill: #828282;
      padding-right: 0px;
      vertical-align: text-top;
      padding-left: 10px;
    }

    /* add a tiny space before the footnote reference number shown in text   */
    sup {
      margin-left: 2px;
    }

  </style>
</head>
